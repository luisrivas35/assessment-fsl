apiVersion: v1
kind: Service
metadata:
  name: fsl-service
  namespace: production  
spec:
  ports:
  - port: 8080
    targetPort: 8080
    name: web
  clusterIP: None
  selector:
    app: fsl-app
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: fsl-app
  namespace: production
spec:  
  serviceName: "fsl-app"
  replicas: 3 
  selector:
    matchLabels:
      app: fsl-app
  template:
    metadata:
      labels:
        app: fsl-app
    spec:      
      containers:
      - name: fsl-container
        image: assessment-fsl:latest
        ports:
        - containerPort: 8080